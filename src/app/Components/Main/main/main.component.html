<div class="BG-Wrapper">

  <section class="Searcher-Wrapper">
    <img src="assets/img/logo.png" alt="Seleccionar Personaje" class="mb-4 d-block mx-auto" width="200" />
    <div class="Searcher">
      <div class="col-md-6 d-flex flex-column align-items-center gap-3">
        <div class="w-100 position-relative">
          <label for="busqueda" class="form-label"></label>
          <input id="busqueda" type="text" class="form-control py-3 fs-5" placeholder="Escriba el nombre del personaje"
            [(ngModel)]="nombreBusqueda" (input)="filtrarPersonajes()" (blur)="ocultarResultadosConDelay()"
            (focus)="mostrarSugerencias = true" autocomplete="off" />

          <ul *ngIf="mostrarSugerencias && resultadosFiltrados.length > 0"
            class="list-group w-100 z-3 mt-1">
            <li *ngFor="let p of resultadosFiltrados" (mousedown)="seleccionarPersonaje(p)"
              class="list-group-item list-group-item-action d-flex align-items-center gap-3" style="cursor: pointer;">
              <img [src]="p.foto" alt="{{ p.nombre }}" width="100" height="120"
                style="object-fit: cover; border-radius: 5px;" />
              <span>{{ p.nombre }}</span>
            </li>
          </ul>
        </div>

        <button class="btn btn-primary px-5 py-3 fs-5" (click)="enviarPersonaje()">
          Enviar
        </button>
      </div>
    </div>
  </section>

  <div *ngIf="intentos.length > 0" class="w-100 mt-5 main-attempts-grid">
    <div class="intento-container">
      <div class="categorias-grid">
    
          <div class="grid-item header-image">PERSONAJE</div>
        <div class="grid-item header">GENERO</div>
        <div class="grid-item header">ROL</div>
        <div class="grid-item header">ESPECIE(S)</div>
        <div class="grid-item header">ORIGEN</div>
        <div class="grid-item header power-item">PODER(S)</div>
        <div class="grid-item header">EQUIPO(S)</div>
      </div>

      <div class="intento-grid" *ngFor="let intento of intentos">
        <div class="grid-item image-cell">
          <img [src]="intento.foto" [alt]="intento.nombre" class="character-image" />
        </div>
        <div class="grid-item" [ngClass]="getColor('genero', intento.genero)">
          {{ intento.genero }}
        </div>
        <div class="grid-item" [ngClass]="getColor('rol', intento.rol)">
          {{ intento.rol }}
        </div>
        <div class="grid-item" [ngClass]="getColor('especie', intento.especie)">
          {{ intento.especie }}
        </div>
        <div class="grid-item" [ngClass]="getColor('origen', intento.origen)">
          {{ intento.origen }}
        </div>
        <div class="grid-item power-item" [ngClass]="getColor('poderes', intento.poderes)">
          {{ intento.poderes.join(', ') }}
        </div>

        <div class="grid-item" [ngClass]="getColor('equipo', intento.equipo)">
          {{ intento.equipo.join(', ') }}
        </div>
      </div>
    </div>
  </div>

<div class="modal fade" id="successModal" tabindex="-1" aria-labelledby="successModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content modal-custom text-center">
      <div class="modal-header modal-header-custom border-0">
        <h5 class="modal-title w-100 fs-3 fw-bold" id="successModalLabel">¡Lo lograste!</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body modal-body-custom">
        <h3 class="mb-4 fw-bold text-white text-shadow-custom">{{ personajeObjetivo?.nombre }}</h3>
        <div class="img-wrapper">
          <img [src]="personajeObjetivo?.foto" alt="{{ personajeObjetivo?.nombre }}" class="character-modal-img" />
        </div>
        <div class="mt-4">
          <button class="btn btn-outline-light px-5 py-2 fs-5 fw-bold" (click)="reiniciarJuego()" data-bs-dismiss="modal">
             Jugar de nuevo
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
